<work-tool-modal 
    *ngIf="modalService.show && modalSelected == 'image'"
    [workTool]="workTool"
    (newPictureEvent)="changeImage($event)"
    (closeModalEvent)="closeModal()" />


    <div class="container pt-4">

        <ng-container *ngIf="isLoading; else workToolTemplate">
            <div class="text-center">
                <p class="text-muted mt-4">Cargando información de la herramienta/equipo</p>
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </ng-container>
    
        <ng-template #workToolTemplate>
    
                <h1>Detalle de la herramienta/equipo</h1>
    
                <div class="d-flex justify-content-between my-4">
                    <a class="btn btn-outline-success" routerLink="/catalogue/work-tools"><i class="fa-solid fa-arrow-left me-2"></i>Atrás</a>
                    <a *ngIf="edit" class="btn btn-secondary" [routerLink]="['/catalogue', 'work-tools','edit', workTool.id]"><i class="fa-solid fa-pen me-2"></i>Editar</a>
                </div>
            
                <div class="row mt-3 p-3">
    
                    <div class="col-md-4 d-flex justify-content-center align-items-center">
                        <img 
                            [ngClass]="{'user-img': authService.user.role.key == 'admin'}"
                            [src]="workTool.image | image:'work-tools'"
                            [alt]="workTool.name"
                            (click)="openModal(workTool, 'image')">
                    </div>
            
            
            
                    <div class="col-md-8 mt-4 mt-md-0">
    
                        <h6 class="text-primary fw-bold">Datos Generales</h6>
    
                        <div class="row">
                            <p class="col-md-4 d-flex flex-column"><small>Nombre</small><span>{{ workTool.name }}</span></p>
                            <p class="col-md-4 d-flex flex-column"><small>Marca</small><span>{{ workTool.brand }}</span></p>
                            <p class="col-md-4 d-flex flex-column"><small>Modelo</small><span>{{ workTool.model }}</span></p>
                            <p class="col-md-4 d-flex flex-column"><small>Costo</small><span>$ {{ workTool.cost | number : '1.2-2' }}</span></p>
                        </div>

                        <div class="row">
                            <p class="col-md-8 d-flex flex-column"><small>Descripción</small><span>{{ workTool.description }}</span></p>
                            <div class="col-md-4 d-flex flex-column">
                                <a [href]="workTool.qr" [download]="workTool.name + ' QR'">
                                    <img 
                                        class="img-qr" 
                                        [src]="workTool.qr" 
                                        alt="QR">
                                </a>
                            </div>
                        </div>
                        
                    </div>
            
                </div>

                <hr>

                <ul class="nav nav-tabs mb-3" id="pills-tab" role="tablist">
                    <li class="nav-item" role="presentation">
                      <button 
                        class="nav-link active" 
                        id="pills-addresses-tab" 
                        data-bs-toggle="pill" 
                        data-bs-target="#pills-addresses" 
                        type="button" 
                        role="tab" 
                        aria-controls="pills-addresses" 
                        aria-selected="true">Mantenimientos</button>
                    </li>
                    
                  </ul>
          
                  <div class="tab-content" id="pills-tabContent">
                    <div 
                      class="tab-pane fade show active" 
                      id="pills-addresses" 
                      role="tabpanel" 
                      aria-labelledby="pills-addresses-tab" 
                      tabindex="0">
                        <maintenance />
                    </div>
                    
                  </div>
        
    
        </ng-template>
    
</div>
