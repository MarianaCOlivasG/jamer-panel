




<vehicle-modal
    *ngIf="modalService.show && modalSelected == 'image'"
    [vehicle]="vehicle"
    (newPictureEvent)="changeImage($event)"
    (closeModalEvent)="closeModal()" /> 


    <div class="container pt-4">

        <ng-container *ngIf="isLoading; else vehicleTemplate">
            <div class="text-center">
                <p class="text-muted mt-4">Cargando información del vehículo</p>
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </ng-container>
    
        <ng-template #vehicleTemplate>
    
                <h1>Detalle del vehículo</h1>
    
                <div class="d-flex justify-content-between my-4">
                    <a class="btn btn-outline-success" routerLink="/catalogue/vehicles"><i class="fa-solid fa-arrow-left me-2"></i>Atrás</a>
                    <div *ngIf="edit">
                        <a class="btn btn-secondary" [routerLink]="['/catalogue', 'vehicles','edit', vehicle.id]"><i class="fa-solid fa-pen me-2"></i>Editar</a>
                        <button class="btn btn-secondary ms-2" (click)="openFileInput()" [disabled]="uploadPolicy">Subir Póliza</button>
                        <input 
                            style="display: none;"
                            type="file"
                            #fileInput
                            (change)="changeFile( $event.target )">
                    </div>
                </div>
            
                <div class="row mt-3 p-3">
    
                    <div class="col-md-4 d-flex justify-content-center align-items-center">
                        <img 
                            [ngClass]="{'user-img': authService.user.role.key == 'admin'}"
                            [src]="vehicle.image | image:'vehicles'"
                            [alt]="vehicle.id"
                            (click)="openModal(vehicle, 'image')">
                    </div>
            
            
                    <div class="col-md-8 mt-4 mt-md-0">
    
                        <h6 class="text-primary fw-bold">Datos Generales</h6>
    
                        <div class="row">
                            <p class="col-md-4 d-flex flex-column"><small>Marca</small><span>{{ vehicle.brand }}</span></p>
                            <p class="col-md-4 d-flex flex-column"><small>Modelo</small><span>{{ vehicle.model }}</span></p>
                            <p class="col-md-4 d-flex flex-column"><small>Año</small><span>{{ vehicle.year }}</span></p>
                            <p class="col-md-4 d-flex flex-column"><small>Color</small><span>{{ vehicle.color }}</span></p>
                            <p class="col-md-4 d-flex flex-column"><small>No. Placas</small><span>{{ vehicle.registration }}</span></p>
                            <div class="col-md-4 d-flex flex-column">
                                <small>Póliza de seguro</small>
                                <div>{{ vehicle.policy }} <a *ngIf="vehicle.policyFile" target="_blank" [href]="fileUrl + '/uploads/file/vehicles/' + vehicle.policyFile">Descargar</a></div>
                            </div>
                        </div>
                        
                    </div>
            
                </div>

                <hr>

                <ul class="nav nav-tabs mb-3" id="pills-tab" role="tablist">
                    <li class="nav-item" role="presentation">
                      <button 
                        class="nav-link active" 
                        id="pills-addresses-tab" 
                        data-bs-toggle="pill" 
                        data-bs-target="#pills-addresses" 
                        type="button" 
                        role="tab" 
                        aria-controls="pills-addresses" 
                        aria-selected="true">Mantenimientos</button>
                    </li>
                    
                  </ul>
          
                  <div class="tab-content" id="pills-tabContent">
                    <div 
                      class="tab-pane fade show active" 
                      id="pills-addresses" 
                      role="tabpanel" 
                      aria-labelledby="pills-addresses-tab" 
                      tabindex="0">
                        <maintenance-vehicle />
                    </div>
                    
                  </div>
        
    
        </ng-template>
    
</div>
