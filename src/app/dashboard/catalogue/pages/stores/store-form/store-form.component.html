<div class="container pt-4">

    <ng-container *ngIf="isLoading; else storeTemplate">
        <div class="text-center">
            <p class="text-muted mt-4">Cargando información del almacén</p>
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </ng-container>

    <ng-template #storeTemplate>

        <h1>{{ isEdit ? 'Actualizar' : 'Crear' }} almacén</h1>


        <div class="text-start my-4">
            <a class="btn btn-outline-success" routerLink="/catalogue/stores"><i class="fa-solid fa-arrow-left me-2"></i>Atrás</a>
        </div>


        <div class="bg-light p-4">
            <form autocomplete="off"
                    [formGroup]="form"> 

                <span class="text-danger"><small>Campos requeridos *</small></span>

                <div class="row mt-3">
    
                    <!-- <div class="col-md-6 mb-2">
                        <label>Tipo de cliente</label>
                        <select 
                            class="form-control mt-2"
                            formControlName="typeId"
                            (ngModelChange)="onChange('typeId')">
                            <option *ngFor="let customersType of customersTypes" [value]="customersType.id">{{ customersType.value }}</option>
                        </select>
                        <div *ngIf="inputInvalid('typeId')" class="text-danger">
                            <span><small>{{ errorMessage('typeId') }}</small></span>
                        </div> 
                    </div> -->
    
                </div>


                <div class="row mt-3">
                    <h6 class="text-primary fw-bold">Datos del almacén</h6>

                    <div class="col-md-4 mb-2">
                        <label>Nombre<span class="text-danger">*</span></label>
                        <input 
                            type="text"
                            class="form-control mt-2"
                            placeholder="Nombre"
                            formControlName="name">
                        <div *ngIf="inputInvalid('name')" class="text-danger">
                            <span><small>{{ errorMessage('name') }}</small></span>
                        </div> 
                    </div>

                    
                    <div class="col-md-4 mb-2">
                        <label>Ubicación<span class="text-danger">*</span></label>
                        <input 
                            type="text"
                            class="form-control mt-2"
                            placeholder="Ubicación"
                            formControlName="ubication">
                        <div *ngIf="inputInvalid('ubication')" class="text-danger">
                            <span><small>{{ errorMessage('ubication') }}</small></span>
                        </div> 
                    </div>

                    <div class="col-md-4 mb-2">
                        <label></label>
                        <div class="form-check">
                            <label class="form-check-label" for="flexCheckChecked">¿Asignar a un empleado?</label>
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                id="flexCheckChecked"
                                formControlName="addEmployee"
                                (ngModelChange)="changeModel('addEmployee')"
                                >
                        </div>
                    </div>


                    <div class="col-md-4 mb-2" *ngIf="form.get('addEmployee')?.value == true">
                        <label>Empleado<span class="text-danger">*</span></label>
                        <select class="form-control mt-2"
                            formControlName="employeeId">
                            <option [value]="null">Selecciona un empleado</option>
                            <option *ngFor="let employee of employees" [value]="employee.id">{{ employee.name }}</option>
                        </select>
                        <div *ngIf="inputInvalid('employeeId')" class="text-danger">
                            <span><small>{{ errorMessage('employeeId') }}</small></span>
                        </div> 
                    </div>


                    <div class="col-md-12 mb-2">
                        <label>Observaciones</label>
                        <textarea 
                            class="form-control mt-2"
                            placeholder="Escribe aquí..."
                            formControlName="observations"></textarea>
                        <div *ngIf="inputInvalid('observations')" class="text-danger">
                            <span><small>{{ errorMessage('observations') }}</small></span>
                        </div> 
                    </div>

                </div>

            </form>


            <div class="text-end mt-4">
                <button 
                    class="btn btn-secondary" 
                    type="button" 
                    (click)="handleSubmit()"
                    [disabled]="isSaving">{{ isSaving ? 'Guardando...' : 'Guardar'}}</button>
            </div>


        </div>


    </ng-template>

</div>
