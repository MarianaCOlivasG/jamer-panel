<div class="store-products">
  <h6 class="mb-2">Productos en este almacén</h6>
  
  <div *ngIf="isLoading" class="text-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>
  
  <div *ngIf="!isLoading && products.length === 0" class="text-muted">
    No hay productos en este almacén.
  </div>
  
  <div *ngIf="!isLoading && products.length > 0" class="table-responsive">
    <table class="table table-sm table-striped">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Cantidad</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td>{{ product.name }}</td>
          <td>{{ product.businessLine.name || '-' }}</td>
          <td>{{ product.productStores[0].amount }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
