

<div class="back-modal">
  <div class="modal" style="display: block;" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-md">
        <div class="modal-content shadow">
          <div class="modal-header">
            <!-- <h5 class="modal-title">({{ workOrderSelected.folio }}) Asignar vehículo a tecnico(s)</h5>  -->
           
            <button type="button" (click)="closeModal()" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">

            <ng-container *ngIf="isLoading; else technicalsTemplate">
                <div class="text-center">
                    <p class="text-muted mt-4">Cargando agenda...</p>
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </ng-container>

            <ng-template #technicalsTemplate>

              <span>Seleccione los tecnicos<span class="text-danger">*</span></span>

              <div class="form-check mt-3" *ngFor="let technical of technicals">

               
                <input 
                    class="form-check-input" 
                    type="radio"
                    name="radioTechnical"
                    [id]="technical.id"
                    [value]="technical.onSelect"
                    [checked]="technical.onSelect === true"
                    (click)="choose(technical.id)" >
                <label class="form-check-label" [for]="technical.id">
                  
                  <div class="bg-technical p-1">
                    <img class="me-2" [src]=" technical.picture | image:'employees'" [alt]="technical.name">
                    <span>{{ technical.name }} {{ technical.lastName }}</span>
                  </div>

                </label>
              </div>

            </ng-template>

            <span class="text-danger" *ngIf="errorsControl.hasError">
              <small>{{ errorsControl.message }}</small>
            </span>

          </div>
          <div class="modal-footer">
            <button type="button" (click)="closeModal()" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            <button 
                  type="button"
                  (click)="onSubmit()" 
                  class="btn btn-primary"
                  [disabled]="isSaving">{{ isSaving ? 'Asignando...' : 'Asignar'}}</button>
          </div>
        </div>
      </div>
    </div>
</div>
