<html-description-general-form 
    *ngIf="modalService.show"
    [htmlDescription]="htmlDescriptionSelected!"
    (newHtmlDescriptionEvent)="newHtmlDescriptionEvent()"
/>


<div class="container pt-4">

    <h1>Plantillas/Descripciones</h1>


    <div *ngIf="create" class="text-end mb-4">
        <button (click)="handleCreate()" class="btn btn-secondary"><i class="fa-solid fa-plus me-2"></i>Crear nuevo</button>
    </div>

    <div class="mt-4 text-center"  *ngIf="isLoading; else templateHtmlDescriptions">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>


    <ng-template #templateHtmlDescriptions>

        <p class="text-center text-muted mt-4" *ngIf="totalResults == 0">No hay plantillas/descripciones por mostar.</p>
        
        <div class="table-responsive mt-4" *ngIf="totalResults > 0">
  
          <span class="fw-bold">Total de resultados: {{totalResults}}</span>
  
          <table class="table table-light table-striped table-hover mt-3">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Nombre</th>
                <th *ngIf="edit || deleted" scope="col">Herramientas</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let htmlDescription of htmlDescriptions; let idx = index;">
                <td>{{ idx + 1 }}</td>
                <td>{{htmlDescription.title}}</td>
                <td *ngIf="edit || deleted" >
                    <button *ngIf="edit" (click)="handleUpdate( htmlDescription )" class="btn btn-sm btn-outline-secondary me-2"><i class="fa-solid fa-pen"></i> Editar</button>
                    <button *ngIf="deleted" (click)="handleDelete( htmlDescription.id, idx )" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i> Eliminar</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
  
      </ng-template>
  


</div>
