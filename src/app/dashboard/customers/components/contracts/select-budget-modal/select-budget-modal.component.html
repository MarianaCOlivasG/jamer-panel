




<div class="back-modal">
    <div class="modal" style="display: block;" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
          <div class="modal-content shadow">
            <div class="modal-header">
              <h5 class="modal-title">Seleccione un cotización</h5> 
              <button 
                type="button" 
                (click)="closeModal()" 
                class="btn-close" 
                data-bs-dismiss="modal" 
                aria-label="Close"
                *ngIf="componentName != 'ContractFormComponent'"></button>
            </div>

            <div class="modal-body">


                <div class="bg-light px-2 py-4 row">
                    <div class="col-md-8">
                      <input-search 
                        placeholder="Buscar cotización..."
                        (onEnter)="search( $event )"
                        (onDebounce)="search( $event )"
                      />
                    </div>
                    <div class="col-md-4 mt-2 mt-md-0">
                      <select 
                        type="text"
                        class="form-control"
                        [(ngModel)]="customerSelected"
                        (ngModelChange)="changeModel('customerId')"
                        >
                        <option [value]="undefined">Selecciona un cliente</option>
                        <option *ngFor="let customer of customers" [ngValue]="customer">{{customer.name}}</option>
                      </select>
                    </div>
                  </div>
              
              
                  <div class="mt-4 text-center"  *ngIf="isLoading; else templateBudgets">
                    <div class="spinner-border text-primary" role="status">
                      <span class="visually-hidden">Loading...</span>
                    </div>
                  </div>
              
                  <ng-template #templateBudgets>
              
                    <p class="text-center text-muted mt-4" *ngIf="totalResults == 0">No hay cotizaciones por mostar.</p>
                    
                    <div class="table-responsive mt-4" *ngIf="totalResults > 0">
              
                      <span class="fw-bold">Total de resultados: {{totalResults}}</span>
              
                      <table class="table table-light table-striped table-hover mt-3">
                        <thead>
                          <tr>
                            <th scope="col">Folio</th>
                            <th scope="col">Cliente</th>
                            <th scope="col">Fecha</th>
                            <th scope="col">Creado por</th>
                            <th scope="col">Herramientas</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr *ngFor="let budget of budgets">
                            <td>{{budget.folio}}</td>
                            <td>{{budget.customer.name}}</td>
                            <td>{{budget.createdAt | date: 	'dd-MMM-yy' }}</td>
                            <td>{{budget.createdBy.name}} {{budget.createdBy.lastName}}</td>
                            <td>
                              <button (click)="selectBudget( +budget.id )"  class="btn btn-sm btn-outline-secondary me-2">Seleccionar</button>
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
              
                    <ng-container *ngIf="totalResults > limit">
                      <paginator 
                        [limit]="limit" 
                        [totalResults]="totalResults"
                        [currentPage]="currentPage"
                        (chageCurrentPage)="changePage( $event )"
                      />
                    </ng-container>
              
              
                  </ng-template>
              
              


            </div>

            <div class="modal-footer" *ngIf="componentName != 'ContractFormComponent'">
              <button 
                type="button"
                (click)="closeModal()" 
                class="btn btn-danger" 
                data-bs-dismiss="modal">Cancelar</button>
            </div>

          </div>
        </div>
      </div>
</div>
