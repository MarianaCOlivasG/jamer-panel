

<diary-event-modal 
  *ngIf="modalService.show"
  [diaryId]="calendarId"
  (newDiaryEvent)="newDiaryEvent()"
  [diaryEventId]="diaryEventIdSelected"
/>


<div class="container pt-4 pb-5" >

  <ng-container *ngIf="isLoading; else diaryTemplate">
      <div class="text-center">
          <p class="text-muted mt-4">Cargando agenda...</p>
          <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
          </div>
      </div>
  </ng-container>

  <ng-template #diaryTemplate>

    <h1>Agenda de <small>{{ employee.name }} {{ employee.lastName }}</small></h1>

    <div class="d-flex justify-content-between my-4" *ngIf="authService.isAdmin()">
      <a (click)="goToBack()"><i class="fa-solid fa-arrow-left me-2"></i>Atrás</a>
      <button (click)="addDiaryEvent()" class="btn btn-secondary"><i class="fa-solid fa-plus me-2"></i> Añadir evento</button>
    </div>


    <div class='calendar' *ngIf="!isLoading">
      <full-calendar 
        *ngIf='calendarVisible' 
        [options]='calendarOptions'>
        <ng-template #eventContent let-arg>
          <b>{{ arg.timeText }}</b>
          <i>{{ arg.event.title }}</i>
        </ng-template>
      </full-calendar>
    </div>

  </ng-template>


</div>
