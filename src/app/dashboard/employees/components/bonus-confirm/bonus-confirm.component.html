



 
<div class="back-modal">
    <div class="modal" style="display: block;" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
          <div class="modal-content shadow">
            <div class="modal-header">
              <h5 class="modal-title">Mi Bono</h5> 
              <button type="button" (click)="closeModal()" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">

              <h6 class="text-primary fw-bold">Datos Generales</h6>
              <div class="row">
                  <p class="col-md-12 d-flex flex-column"><small>Fecha</small><span>{{ bonusSelected.createdAt | date: 	'dd-MMM-yy' }}</span></p>
                  <p class="col-md-12 d-flex flex-column"><small>Titulo</small><span>{{ bonusSelected.title }}</span></p>
                  <p class="col-md-12 d-flex flex-column"><small>Descripción</small><span>{{ bonusSelected.title }}</span></p>
                  <p *ngIf="bonusSelected.file" class="col-md-12 d-flex flex-column"><small>Archivo</small><a [href]="fileUrl" target="_blank">Descargar</a></p>
              </div>

              <hr>

              <ng-container *ngIf="!bonusSelected.isValidated; else elseTemplate">
                <span>Firma de enterado dentro del recuadro.<span class="text-danger">*</span></span>
                <div class="mt-3"> 
                  <signature  
                  (signatureEvent)="signatureEvent( $event )"
                  />
                </div>
              </ng-container>

              <ng-template #elseTemplate>
                <div class="text-center">
                  <img 
                    class="signatureImage"
                    [src]="bonusSelected.signature | image:'signatures'" 
                    [alt]="bonusSelected.employee.name"
                  >
                </div>
              </ng-template>



            </div>
            <div class="modal-footer">
              <button type="button" (click)="closeModal()" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
          </div>
        </div>
      </div>
</div>
