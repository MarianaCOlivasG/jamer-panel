




<div class="container pt-4">

    <ul class="nav nav-tabs mb-3" id="pills-tab" role="tablist">
        <li class="nav-item" role="presentation">
          <button 
            class="nav-link active" 
            id="pills-home-tab" 
            data-bs-toggle="pill" 
            data-bs-target="#pills-home" 
            type="button" 
            role="tab" 
            aria-controls="pills-home" 
            aria-selected="true"><span class="badge bg-info">{{ totals['incidences'] > 99 ? '99 +' : totals['incidences'] }}</span> Mis incicencias</button>
        </li>
        <li class="nav-item" role="presentation">
          <button 
            class="nav-link" 
            id="pills-profile-tab" 
            data-bs-toggle="pill" 
            data-bs-target="#pills-profile" 
            type="button" 
            role="tab" 
            aria-controls="pills-profile" 
            aria-selected="false"><span class="badge bg-info">{{ totals['bonuses'] > 99 ? '99 +' : totals['bonuses'] }}</span> Mis bonos</button>
        </li>
      </ul>
      <div class="tab-content" id="pills-tabContent">
        <div class="tab-pane fade show active" id="pills-home" role="tabpanel" aria-labelledby="pills-home-tab" tabindex="0">
            <user-incidences 
              (totalResultsEvent)="getTotals( $event, 'incidences' )"
            />
        </div>
        <div class="tab-pane fade" id="pills-profile" role="tabpanel" aria-labelledby="pills-profile-tab" tabindex="0">
            <user-bonuses
              (totalResultsEvent)="getTotals( $event, 'bonuses' )"
            />
        </div>
      </div>



</div>
